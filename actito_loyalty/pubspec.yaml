name: actito_loyalty
description: "Actito Loyalty Flutter Plugin: Harness the power of digital cards that live beyond your app and are always in your customer’s pocket."
version: 4.0.0
homepage: https://actito.com
documentation: https://docs.notifica.re/sdk/v4/flutter/setup/
repository: https://github.com/actito/actito-sdk-flutter/tree/main/actito_loyalty

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.9.0
  actito: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  build_runner: ^2.0.0
  json_serializable: ^6.3.0

dependency_overrides:
  actito:
    path: ../actito
  actito_flutter:
    path: ../actito_flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.actito.loyalty.flutter
        pluginClass: ActitoLoyaltyPlugin
      ios:
        pluginClass: ActitoLoyaltyPlugin
