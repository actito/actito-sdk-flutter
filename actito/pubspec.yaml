name: actito
description: Official Actito Flutter plugin. Implements the power of the Actito platform in Flutter applications.
version: 5.1.0
homepage: https://actito.com
documentation: https://developers.actito.com/docs/push-implementation/flutter/implementation/
repository: https://github.com/actito/actito-sdk-flutter/tree/main/actito

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  actito_flutter: 5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0

dependency_overrides:
  actito_flutter:
    path: ../actito_flutter
