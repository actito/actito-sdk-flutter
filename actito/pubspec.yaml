name: actito
description: Official Actito Flutter plugin. Implements the power of the Actito platform in Flutter applications.
version: 4.0.0
homepage: https://actito.com
documentation: https://docs.notifica.re/sdk/v4/flutter/setup/
repository: https://github.com/actito/actito-sdk-flutter/tree/main/actito

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  actito_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0

dependency_overrides:
  actito_flutter:
    path: ../actito_flutter
