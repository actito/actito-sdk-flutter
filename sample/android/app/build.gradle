plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.actito.gradle.actito-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace 'com.actito.sample'
    compileSdkVersion 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.actito.sample.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        manifestPlaceholders = [
                googleMapsApiKey: localProperties.getProperty('google.maps.key'),
                actitoApplicationId: localProperties.getProperty('actito.application.id'),
        ]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword localProperties.getProperty('keystore.debug.store.password')
            keyAlias localProperties.getProperty('keystore.debug.key.alias')
            keyPassword localProperties.getProperty('keystore.debug.key.password')
        }
        release {
            storeFile file('release.keystore')
            storePassword localProperties.getProperty('keystore.release.store.password')
            keyAlias localProperties.getProperty('keystore.release.key.alias')
            keyPassword localProperties.getProperty('keystore.release.key.password')
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix '.dev'
        }
        release {
//            minifyEnabled true
//            shrinkResources true
//            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            signingConfig signingConfigs.release
        }
    }

    flavorDimensions 'default'
    productFlavors {
        development {
            dimension 'default'
            applicationId "com.actito.sample.app.test"
        }
        production {
            dimension 'default'
        }
    }

    applicationVariants.configureEach {
        if (name == "developmentDebug") {
            resValue("string", "actito_app_links_hostname", "\"\"")
            resValue("string", "actito_dynamic_link_hostname", "\"\"")
        } else if (name == "developmentRelease") {
            resValue("string", "actito_app_links_hostname", "\"\"")
            resValue("string", "actito_dynamic_link_hostname", "\"\"")
        } else if (name == "productionDebug") {
            resValue("string", "actito_app_links_hostname", "\"67092ff3d6bb84eac9e0fb51.applinks.notifica.re\"")
            resValue("string", "actito_dynamic_link_hostname", "\"actito-sample-app-dev.ntc.re\"")
        } else if (name == "productionRelease") {
            resValue("string", "actito_app_links_hostname", "\"\"")
            resValue("string", "actito_dynamic_link_hostname", "\"\"")
        }
    }

    buildFeatures {
        buildConfig = true
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
