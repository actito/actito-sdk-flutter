name: actito_push_ui
description: "Actito Push UI Flutter Plugin: Use native screens and elements to display your push notifications and handle its actions with zero effort."
version: 5.0.0-beta.2
homepage: https://actito.com
documentation: https://developers.actito.com/docs/push-implementation/flutter/implementation/
repository: https://github.com/actito/actito-sdk-flutter/tree/main/actito_push_ui

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.9.0
  actito: ^5.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  build_runner: ^2.0.0
  json_serializable: ^6.3.0

dependency_overrides:
  actito:
    path: ../actito
  actito_flutter:
    path: ../actito_flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.actito.push.ui.flutter
        pluginClass: ActitoPushUIPlugin
      ios:
        pluginClass: ActitoPushUIPlugin
